# Harness UI v0.5 — 3-OS CI 매트릭스(Linux/macOS/Windows). M1 생성, M2·M3·M5·M6 게이트 재사용.
# typecheck + vitest + build. 실 codex/claude 스모크(A17)는 러너 미설치라 CI 제외(로컬 수동).
name: harness-ui-ci

on:
  push:
    paths: ["harness-ui/**", ".github/workflows/ci.yml"]
  pull_request:
    paths: ["harness-ui/**", ".github/workflows/ci.yml"]
  workflow_dispatch:

defaults:
  run:
    working-directory: harness-ui

jobs:
  test:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        node: [20, 22]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: npm
          cache-dependency-path: harness-ui/package-lock.json
      - run: npm ci --ignore-scripts
      - run: npx tsc --noEmit
      - run: npx vitest run
      - run: npx vite build
